<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abhay Kumar Sharma | Developer Portfolio</title>
  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="start_style.css">
</head>
<body>

  <!-- Subtle grid overlay -->
  <div class="grid-overlay"></div>

  <!-- Main Splash Container -->
  <main class="splash-container">
    <div class="logo-area">
      <div class="badge">System Architecture &amp; Engineering Portfolio</div>
      <h1 class="title">ABHAY KUMAR SHARMA</h1>
      <p class="subtitle">Cloud &amp; Full Stack Developer</p>
    </div>

    <div class="action-area">
      <a href="index.html" class="enter-btn">
        <span>Enter Portfolio</span>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="arrow-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
        </svg>
      </a>
    </div>
  </main>

  <!-- Elegant floating dust particles (CSS animated) -->
  <div class="particles">
    <div class="particle" style="--x: 10%; --y: 80%; --delay: 0s; --speed: 20s; --size: 3px;"></div>
    <div class="particle" style="--x: 30%; --y: 90%; --delay: 2s; --speed: 15s; --size: 2px;"></div>
    <div class="particle" style="--x: 60%; --y: 75%; --delay: 1s; --speed: 25s; --size: 4px;"></div>
    <div class="particle" style="--x: 80%; --y: 85%; --delay: 4s; --speed: 18s; --size: 2px;"></div>
    <div class="particle" style="--x: 95%; --y: 70%; --delay: 3s; --speed: 22s; --size: 3px;"></div>
  </div>

</body>
</html>
